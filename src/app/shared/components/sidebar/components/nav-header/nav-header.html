<div class="flex gap-2 items-center" [class.flex-col-reverse]="isCollapsed()">
	<a routerLink="/" class="bg-white rounded-lg size-8 flex items-center justify-center">
		<ng-icon class="text-black text-sm" [name]="icon()"></ng-icon>
	</a>
	@if (!isCollapsed()) {
		<p class="font-medium text-sm flex-1">{{ title() }}</p>
	}
	@if (canCollapse()) {
		<button
			hlmBtn
			size="icon"
			variant="ghost"
			class="rounded-full"
			(click)="sidebarService.toggleCollapse()"
		>
			<ng-icon
				class="text-[16px]"
				[name]="isCollapsed() ? 'lucideChevronRight' : 'lucideChevronLeft'"
			></ng-icon>
		</button>
	}
</div>
