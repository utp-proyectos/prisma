<a
	hlmItem
	[routerLink]="to()"
	size="xs"
	[class]="disabledClass()"
	routerLinkActive="text-primary-foreground bg-primary hover:bg-primary!"
	[routerLinkActiveOptions]="{ exact: true }"
>
	<hlm-item-media variant="icon">
		<ng-icon [name]="icon()" class="text-[16px]" />
	</hlm-item-media>
	<hlm-item-content>
		<hlm-item-title>{{ title() }}</hlm-item-title>
	</hlm-item-content>
</a>
