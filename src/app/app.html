<p>Hola {{ title() }}</p>
<button hlmBtn variant="outline">Button</button>
<ng-icon hlm name="lucideChevronRight" />
<button hlmBtn size="icon" class="bg-primary">
	<ng-icon name="lucideArrowUp" />
</button>

<button hlmBtn variant="outline" (click)="modal.set('open')">Open Dialog</button>

<hlm-dialog [state]="modal()" (closed)="modal.set('closed')">
	<hlm-dialog-content *hlmDialogPortal="let ctx">
		<hlm-dialog-header>
			<h3 hlmDialogTitle>Edit profile</h3>
			<p hlmDialogDescription>Make changes to your profile here. Click save when you're done.</p>
		</hlm-dialog-header>
		<hlm-dialog-footer>
			<button hlmBtn variant="outline" hlmDialogClose>Cancel</button>
			<button hlmBtn type="submit">Save changes</button>
		</hlm-dialog-footer>
	</hlm-dialog-content>
</hlm-dialog>

<router-outlet></router-outlet>
