<hlm-dialog [state]="state()" (closed)="closed.emit()">
	<hlm-dialog-content *hlmDialogPortal="let ctx" class="sm:w-sm">
		<hlm-dialog-header>
			<h3 hlmDialogTitle>Crear folder</h3>
			<p hlmDialogDescription>Crea un folder para ordenar tus pizarras.</p>
		</hlm-dialog-header>

		<form [formRoot]="folderForm">
			<hlm-field-group>
				<hlm-field>
					<label hlmFieldLabel for="field-preview-fullname">Nombre</label>
					<hlm-input-group>
						<input
							hlmInputGroupInput
							[formField]="folderForm.name"
							placeholder="Nombre del folder"
						/>
						<hlm-input-group-addon>
							<ng-icon name="lucideFolder" />
						</hlm-input-group-addon>
					</hlm-input-group>
					@for (error of folderForm.name().errors(); track error.kind) {
						<hlm-field-error [validator]="error.kind">
							{{ error.message }}
						</hlm-field-error>
					}
				</hlm-field>
			</hlm-field-group>

			<hlm-dialog-footer>
				<button hlmBtn variant="outline" hlmDialogClose>Cancel</button>
				<button
					hlmBtn
					type="submit"
					[disabled]="
						folderForm().submitting() || (folderForm().touched() && folderForm().invalid())
					"
				>
					Guardar folder
				</button>
			</hlm-dialog-footer>
		</form>
	</hlm-dialog-content>
</hlm-dialog>
