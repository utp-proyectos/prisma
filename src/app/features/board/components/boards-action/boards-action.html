<div class="flex items-center justify-between mt-4">
	<hlm-input-group class="w-70">
		<input hlmInputGroupInput placeholder="Buscar pizarras" />
		<hlm-input-group-addon>
			<ng-icon name="lucideSearch" />
		</hlm-input-group-addon>
	</hlm-input-group>

	<div class="flex items-center gap-2">
		<hlm-select>
			<hlm-select-trigger class="w-57">
				<hlm-select-value placeholder="Ordenar por" />
			</hlm-select-trigger>
			<hlm-select-content *hlmSelectPortal>
				<hlm-select-group>
					<hlm-select-label>Ordenar por</hlm-select-label>
					@for (item of items; track item.value) {
						<hlm-select-item [value]="item.value">{{ item.label }}</hlm-select-item>
					}
				</hlm-select-group>
			</hlm-select-content>
		</hlm-select>
		<button hlmBtn (click)="createFolderModal.emit()">
			<ng-icon name="lucidePlus"></ng-icon>
			Nueva carpeta
		</button>
	</div>
</div>
