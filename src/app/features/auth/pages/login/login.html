<auth-header
	title="Ingresa a tu cuenta"
	description="Ingresa tus credenciales para Iniciar Sesión"
/>

<div hlmFieldGroup>
	<div hlmField>
		<label hlmFieldLabel for="email">Email</label>
		<input hlmInput id="email" type="email" placeholder="m@example.com" />
	</div>
	<div hlmField>
		<label hlmFieldLabel for="password">Password</label>
		<input hlmInput id="password" type="password" placeholder="contraseña" />
	</div>
	<div hlmField>
		<button hlmBtn type="submit">Iniciar Sesión</button>
	</div>
	<hlm-field-separator>O continuar con</hlm-field-separator>
	<div hlmField>
		<button hlmBtn variant="outline" type="button">
			<ng-icon class="text-xl" name="remixGoogleFill" />
			Log in con Google
		</button>
		<button hlmBtn variant="outline" type="button">
			<ng-icon class="text-xl" name="remixGithubFill" />
			Log in con GitHub
		</button>
		<p hlmFieldDescription class="text-center">
			¿No tienes una cuenta?
			<a routerLink="/auth/register">Registrate</a>
		</p>
	</div>
</div>
