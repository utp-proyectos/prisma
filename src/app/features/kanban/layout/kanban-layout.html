<div class="relative p-5 flex h-dvh gap-5 overflow-x-hidden">

	<app-sidebar>

		<sidebar-header>
			<nav-header icon="lucideTriangle" title="Proyecto 1"></nav-header>
		</sidebar-header>

		<sidebar-content>

			<button hlmBtn class="w-full mt-2 mb-4" variant="default">
				<ng-icon name="lucidePlus"></ng-icon>
				Crear tablero
			</button>

			<hlm-field-separator />

			<div class="font-medium text-primary px-2 mt-4 mb-2 text-center">
				Tus Tableros
			</div>

			@for (tablero of tusTableros(); track tablero.to) {
			<div class="group relative flex items-center justify-between invisible-btn-container">
				<sidebar-item class="w-full" [icon]="tablero.icon" [title]="tablero.title" [to]="tablero.to"></sidebar-item>

				<button
					class="absolute right-2 opacity-0 group-hover:opacity-100 text-zinc-500 hover:text-zinc-300 transition-opacity z-10">
					<ng-icon name="lucideMoreHorizontal"></ng-icon>
				</button>
			</div>
			}

		</sidebar-content>
	</app-sidebar>

	<div class="w-full">
		<router-outlet></router-outlet>
	</div>
</div>
